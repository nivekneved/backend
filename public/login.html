<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Lounge | Engine Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/stylesheets/login.css">
</head>

<body>
    <div class="login-card">
        <div class="header">
            <div class="logo">Travel Lounge <span class="logo-engine">Engine</span></div>
            <div class="subtitle">Protected System Access</div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" required placeholder="admin@travellounge.mu">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="login-btn">Secure Login</button>
            <div id="error-msg" class="error-message">Invalid credentials</div>
        </form>
    </div>

    <script src="/javascripts/login.js"></script>
</body>

</html>
